name: IPA Signer Engine
on:
  repository_dispatch:
    types: [sign_ipa]

jobs:
  sign:
    runs-on: ubuntu-latest
    steps:
      - name: Install zsign
        run: |
          sudo apt update && sudo apt install g++ libssl-dev git curl -y
          git clone https://github.com/zhly0/zsign.git && cd zsign
          g++ *.cpp -lcrypto -O3 -o zsign && sudo cp zsign /usr/local/bin/

      - name: Download Files
        run: |
          # Safe Download logic
          curl -f -L "${{ github.event.client_payload.ipa_url }}" -o app.ipa || exit 1
          # Agar p12 aur mp bot se nahi aa rahe, toh humein bot.php bhi update karna hoga
          curl -f -L "${{ github.event.client_payload.p12_url }}" -o cert.p12 || exit 1
          curl -f -L "${{ github.event.client_payload.mp_url }}" -o prov.mobileprovision || exit 1
          
      - name: Sign IPA
        run: |
          zsign -k cert.p12 -p "${{ github.event.client_payload.password }}" -m prov.mobileprovision -o signed.ipa app.ipa
          
      - name: Upload to Catbox
        run: |
          RESULT=$(curl -F "reqtype=fileupload" -F "fileToUpload=@signed.ipa" https://catbox.moe/user/api.php)
          echo "DIRECT_URL=$RESULT" >> $GITHUB_ENV
          
      - name: Notify Bot
        run: |
          curl -X POST "https://api.telegram.org/bot${{ github.event.client_payload.bot_token }}/sendMessage" \
          -d "chat_id=${{ github.event.client_payload.chat_id }}&parse_mode=Markdown&text=✅ *IPA Signed Successfully!*%0A%0A📲 [Install App](itms-services://?action=download-manifest&url=https://cidprivate.com/ipabot/gen.php?url=${{ env.DIRECT_URL }})"
